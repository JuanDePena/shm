listen_addresses = '*'
port = 5433
max_connections = 100
password_encryption = 'scram-sha-256'
shared_buffers = '2GB'
effective_cache_size = '16GB'
maintenance_work_mem = '512MB'
work_mem = '8MB'
wal_buffers = '16MB'
min_wal_size = '1GB'
max_wal_size = '4GB'
checkpoint_completion_target = 0.9
wal_compression = on

wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

archive_mode = on
archive_command = '/usr/bin/pgbackrest --stanza=control archive-push %p'
