setuid=pdns
setgid=pdns

local-address=0.0.0.0,::
local-port=53
version-string=anonymous

launch=lmdb
lmdb-filename=/var/lib/pdns/lmdb/pdns.lmdb

primary=no
secondary=yes

api=no
webserver=yes
webserver-address=127.0.0.1
webserver-port=8081
webserver-allow-from=127.0.0.1

allow-axfr-ips=10.89.0.1
allow-notify-from=10.89.0.1
default-api-rectify=yes
