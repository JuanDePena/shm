<VirtualHost *:80>
  ServerName auth.pyrosa.com.do

  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
  RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]

  ErrorLog /var/log/httpd/auth.pyrosa.com.do_error.log
  CustomLog /var/log/httpd/auth.pyrosa.com.do_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName auth.pyrosa.com.do

  AllowEncodedSlashes NoDecode

  SSLEngine on
  SSLCertificateFile /etc/ssl/simplehostman/pyrosa.com.do/fullchain.pem
  SSLCertificateKeyFile /etc/ssl/simplehostman/pyrosa.com.do/privkey.pem

  Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"

  ProxyPreserveHost On
  ProxyRequests Off
  ProxyAddHeaders On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"

  <LocationMatch "^/if/flow/initial-setup/?$">
    Require all denied
  </LocationMatch>

  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule /(.*) ws://127.0.0.1:10170/$1 [P,L]

  ProxyPass / http://127.0.0.1:10170/ nocanon retry=0 timeout=120
  ProxyPassReverse / http://127.0.0.1:10170/

  ErrorLog /var/log/httpd/auth.pyrosa.com.do_ssl_error.log
  CustomLog /var/log/httpd/auth.pyrosa.com.do_ssl_access.log combined
</VirtualHost>
</IfModule>
